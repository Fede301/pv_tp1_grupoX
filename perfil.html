<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="/css/stylesperfil.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap" rel="stylesheet">

    <title>Perfil del usuario</title>
</head>
<body>
    <header id="encabezado">
        <h1>PROYECTOS EDUCATIVOS</h1>

        <nav id="navegacion">
            <ul id="lista-navegacion">
                <li class="opcion-lista"><a href="index.html">INICIO</a></li>
                <li class="opcion-lista"><a href="proyectos.html">PROYECTOS</a></li>
                <li class="opcion-lista"><a href="detalle.html">DETALLES DE PROYECTOS</a></li>
            </ul>
        </nav>
    </header>

    <h2>Mi Perfil</h2>

    <figure>
            <img alt="foto-perfil" src="https://cdn.pixabay.com/photo/2023/02/18/11/00/icon-7797704_1280.png" width="150">
            <figcaption>Usuario: caroZ11</figcaption>
        </figure>

    <form action="#" method="post">
        <fieldset>
            <legend>Datos Personales</legend>
            <label for="nombre">Nombre Completo</label>
            <input type="text" id="nombre" name="nombre" value="Carolina Apaza" readonly required><br>
            
            <label for="rol">Rol</label>
            <select name="rol" id="rol">
                <option value="estudiante">Estudiante</option>
                <option value="docente">Docente</option>
            </select>
        </fieldset>

        <fieldset>
            <legend>Preferencias de Sistema</legend>
            <input type="checkbox" id="notificaciones" name="notificaciones" checked>
            <label for="notificaciones">Recibir notificaciones por correo</label><br>
        </fieldset>
    </form>



    <footer>
        <p> Programacion visual 2026  -   Facultad de Ingenieria </p>
    </footer>
</body>
